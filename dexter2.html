<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>Quiz за Dexter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
      padding: 40px;
    }
    button {
      margin: 10px;
      padding: 12px 20px;
      cursor: pointer;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 6px;
      font-size: 16px;
      transition: 0.3s;
    }
    button:hover {
      background: #0056b3;
    }
    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      overflow: auto;
      padding: 20px;
    }
    .quiz-box {
    background: white;
    padding: 30px;           
    border-radius: 16px;
    width: 80%;             
    max-width: 600px;     
    max-height: 80vh;       
    overflow-y: auto;        
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    text-align: left;
    position: relative;
    animation: fadeIn 0.5s;
    }
    @keyframes fadeIn {
      from {opacity:0; transform: scale(0.9);}
      to {opacity:1; transform: scale(1);}
    }
    .answers button {
      display: block;
      width: 100%;
      margin: 8px 0;
      transition: 0.2s;
    }
    .answers button.correct { background: green !important; }
    .answers button.wrong { background: red !important; }
    #timer { font-weight: bold; color: red; font-size: 18px; }
    #nextBtn { display: none; background: green; }
    #progressBar {
      width: 100%; height: 12px; background: #ddd;
      border-radius: 6px; margin-bottom: 10px; overflow: hidden;
    }
    #progressFill { height: 100%; width: 0%; background: #28a745; transition: 0.5s; }
    .review-item { margin-bottom: 15px; padding: 10px; border-bottom: 1px solid #ddd; }
    .correct { color: green; }
    .wrong { color: red; }
    .hidden { display: none; }
    input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; }
  </style>
</head>
<body>

<h1>Quiz за Dexter</h1>
<button onclick="openQuiz()">Започни</button>

<div id="overlay">
  <div class="quiz-box">
    <!-- START SCREEN -->
    <div id="startScreen">
      <h2>Въведи имена</h2>
      <input id="firstName" placeholder="Първо име">
      <input id="lastName" placeholder="Фамилия">
      <div id="errorMsg" style="color:red; display:none;">Моля въведи и двете имена</div>
      <button onclick="startQuiz()">Старт</button>
    </div>

    <!-- QUIZ CONTENT -->
    <div id="quizContent" class="hidden">
      <div id="timer"></div>
      <div id="progressBar"><div id="progressFill"></div></div>
      <div id="progress"></div>
      <h2 id="question"></h2>
      <div id="answers" class="answers"></div>
      <button id="nextBtn" onclick="nextQuestion()">Напред</button>
    </div>

    <!-- RESULT -->
    <div id="result"></div>
  </div>
</div>

<script>
const originalQuestions = [
  { question: "Как се казва главният герой?", answers: ["Dexter Morgan", "Debra Morgan", "Rita Bennett"], correct: 0, level: "easy" },
  { question: "Къде работи Декстър?", answers: ["Miami Fire Dept", "FBI", "Miami Metro Police"], correct: 2, level: "easy" },
  { question: "Какво е хоби на Декстър?", answers: ["Убийство на престъпници", "Колекциониране на коли", "Плуване"], correct: 0, level: "easy" },
  { question: "Кой е братът на Декстър?", answers: ["Brian Moser", "Harry Morgan", "Angel Batista"], correct: 0, level: "medium" },
  { question: "Как се казва сестрата на Декстър?", answers: ["Rita Bennett", "Debra Morgan", "Laura Moser"], correct: 1, level: "medium" },
  { question: "Кой е наставникът на Декстър?", answers: ["James Doakes", "Angel Batista", "Harry Morgan"], correct: 2, level: "medium" },
  { question: "Какво Декстър оставя на жертвите си?", answers: ["Кървави трофеи", "Писма", "Бижута"], correct: 0, level: "medium" },
  { question: "Къде се крие Декстър от закона?", answers: ["В тъмната стая", "В мазето", "В офиса"], correct: 0, level: "medium" },
  { question: "Коя е съпругата на Декстър?", answers: ["Rita Bennett", "Debra Morgan", "Lila Tournay"], correct: 0, level: "medium" },
  { question: "Декстър има ли деца?", answers: ["Да, Harrison", "Не", "Да, но не знае"], correct: 0, level: "medium" },
  { question: "Кой е главният антагонист в сезон 1?", answers: ["Ice Truck Killer", "Brian Moser", "Trinity Killer"], correct: 0, level: "hard" },
  { question: "Каква е професията на Дебра?", answers: ["Полицай", "Доктор", "Учител"], correct: 0, level: "easy" },
  { question: "Кой е любимият метод на Декстър за убиване?", answers: ["С нож", "С отрова", "С огън"], correct: 0, level: "medium" },
  { question: "Какво Декстър крие пред колегите си?", answers: ["Парите си", "Семейни тайни", "Своето второ аз"], correct: 2, level: "medium" },
  { question: "Кой е Angel Batista?", answers: ["Съпруг на Rita", "Колега на Dexter", "Антагонист"], correct: 1, level: "easy" },
  { question: "Какво означава 'Dark Passenger'?", answers: ["Скрит талант", "Вътрешния убиец на Dexter", "Психично заболяване"], correct: 1, level: "hard" },
  { question: "Коя е първата сериозна връзка на Декстър?", answers: ["Debra Morgan", "Lila Tournay", "Rita Bennett"], correct: 2, level: "medium" },
  { question: "Кой е Джеймс Доукс?", answers: ["Сержант, който подозира Dexter", "Колега на Dexter", "Детектив на ICE"], correct: 0, level: "hard" },
  { question: "Какво е главното правило на Декстър?", answers: ["Не лъжи", "Не убивай невинни", "Не кради"], correct: 1, level: "easy" },
  { question: "Кой е последният убиец на Декстър?", answers: ["Trinity Killer", "Brian Moser", "Kurt Caldwell"], correct: 2, level: "hard" }
];
  
let questions = [];
let userAnswers = [];
let currentQuestion = 0;
let score = 0;
let selectedAnswer = null;
let timer;
let timeLeft = 60;
let userName = "";

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function openQuiz() {
  document.getElementById("overlay").style.display = "flex";
  document.getElementById("startScreen").classList.remove("hidden");
  document.getElementById("quizContent").classList.add("hidden");
  document.getElementById("result").innerHTML = "";
}

function startQuiz() {
  const first = document.getElementById("firstName").value.trim();
  const last = document.getElementById("lastName").value.trim();
  if (!first || !last) { document.getElementById("errorMsg").style.display = "block"; return; }
  document.getElementById("errorMsg").style.display = "none";
  userName = first + " " + last;
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("quizContent").classList.remove("hidden");

  questions = shuffle([...originalQuestions]).map(q => ({ ...q, answers: shuffle([...q.answers]) }));
  userAnswers = []; currentQuestion = 0; score = 0;
  showQuestion();
}

function startTimer(level="easy") {
  if(level === "easy") timeLeft = 60;
  else if(level === "medium") timeLeft = 45;
  else timeLeft = 30;

  document.getElementById("timer").innerText = `Време: ${timeLeft}s`;
  clearInterval(timer);
  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = `Време: ${timeLeft}s`;
    if (timeLeft <= 0) { clearInterval(timer); nextQuestion(); }
  }, 1000);
}

function showQuestion() {
  selectedAnswer = null;
  const q = questions[currentQuestion];
  startTimer(q.level);

  // Цвет според трудността
  let colors = {easy: "#d4edda", medium: "#fff3cd", hard: "#f8d7da"};
  document.querySelector(".quiz-box").style.background = colors[q.level];

  document.getElementById("progress").innerText = `Въпрос ${currentQuestion + 1} от ${questions.length}`;
  const progressPercent = ((currentQuestion) / questions.length) * 100;
  document.getElementById("progressFill").style.width = progressPercent + "%";

  document.getElementById("question").innerText = q.question;
  const answersDiv = document.getElementById("answers"); answersDiv.innerHTML = "";
  document.getElementById("nextBtn").style.display = "none";

  q.answers.forEach((answer, index) => {
    const btn = document.createElement("button"); btn.innerText = answer;
    btn.onclick = () => selectAnswer(index, btn);
    answersDiv.appendChild(btn);
  });
}

function selectAnswer(index, btn) {
  selectedAnswer = index;
  document.querySelectorAll(".answers button").forEach(b => b.style.background = "#007bff");
  btn.style.background = "orange";
  document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion() {
  clearInterval(timer);
  const q = questions[currentQuestion];
  const original = originalQuestions.find(o => o.question === q.question);
  const correctAnswer = original.answers[original.correct];
  const chosen = selectedAnswer !== null ? q.answers[selectedAnswer] : null;
  userAnswers.push({ question: q.question, chosen, correct: correctAnswer });
  if (chosen === correctAnswer) score++;
  currentQuestion++;
  if (currentQuestion < questions.length) showQuestion();
  else showResult();
}

function showResult() {
  document.getElementById("quizContent").classList.add("hidden");
  document.getElementById("progressFill").style.width = "100%";
  const percent = Math.round((score / questions.length) * 100);

  let reviewHTML = `<h3>${userName}</h3>`;
  reviewHTML += `<h3>Верен отговор: ${score} от ${questions.length} (${percent}%)</h3>`;

  userAnswers.forEach(item => {
    const isCorrect = item.chosen === item.correct;
    reviewHTML += `<div class="review-item"><strong>${item.question}</strong><br>Твоят отговор: <span class="${isCorrect ? 'correct' : 'wrong'}">${item.chosen || 'няма'}</span><br>Правилен: <span class="correct">${item.correct}</span></div>`;
  });

  reviewHTML += `<button onclick="closeQuiz()">Затвори</button>`;

  document.getElementById("result").innerHTML = reviewHTML;
}

function closeQuiz() { document.getElementById("overlay").style.display = "none"; clearInterval(timer); }
</script>

</body>
</html>
